<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso: Estacionamento</title>
    <!-- Scripts Externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
        }
        .table-container {
            flex: 1;
            overflow-y: auto;
            background: #cbd5e1;
            position: relative;
        }
        .table-container::-webkit-scrollbar {
            width: 10px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #94a3b8;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 5px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #1e293b;
        }
        .clickable-row {
            cursor: pointer;
        }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-color: #475569;
        }
        .search-container {
            position: relative;
            flex: 1;
            width: 100%;
        }
        #clearSearch {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #1e293b;
            cursor: pointer;
            display: none;
            font-size: 1.25rem;
            line-height: 1;
        }
        #clearSearch:hover {
            color: #000;
        }
        
        .search-header-dark {
            background-color: #1e293b;
            padding: 16px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.1);
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 1.5rem;
            background: #94a3b8;
            border-bottom: 2px solid #334155;
            z-index: 10;
        }
        
        tbody tr:nth-child(even) {
            background-color: #e2e8f0;
        }
        tbody tr:nth-child(odd) {
            background-color: #f1f5f9;
        }
        tbody tr:hover {
            background-color: #facc15 !important;
        }
    </style>
</head>
<body class="font-sans font-normal text-sm">

    <!-- Header -->
    <header class="bg-slate-200 shadow-lg p-3 flex justify-between items-center gap-4 z-20 border-b-2 border-slate-400">
        <div class="flex items-center gap-3 max-w-[75%]">
            <div class="flex-shrink-0 bg-slate-900 p-1.5 rounded-lg shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-yellow-400" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
                </svg>
            </div>
            <h1 class="text-lg text-slate-900 leading-tight break-words uppercase tracking-tight font-semibold">
                Acesso: Estacionamento
            </h1>
        </div>
        <button id="loginBtn" class="bg-slate-900 hover:bg-black text-white px-4 py-1.5 rounded-lg transition-all shadow-md whitespace-nowrap border border-slate-700 font-medium text-xs">
            Admin
        </button>
    </header>

    <!-- Barra de Estado -->
    <div class="status-bar text-xs">
        <div class="flex items-center gap-2 text-slate-900 italic font-normal">
            <span class="not-italic font-medium">Atualizado em:</span>
            <span id="lastUpdateDate">Iniciando...</span>
        </div>
        <div class="flex items-center gap-2 text-slate-900">
            <span class="uppercase tracking-widest font-bold">Total:</span>
            <span id="resultCounter" class="text-base bg-slate-900 text-yellow-400 px-2 py-0.5 rounded shadow-md font-bold">0</span>
        </div>
    </div>

    <!-- Conteúdo Principal -->
    <main class="flex-1 flex flex-col overflow-hidden bg-slate-500">
        
        <div class="search-header-dark border-b border-slate-950 flex flex-nowrap items-center px-4 md:px-8 gap-3">
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Pesquisar por Nome ou CPF..." 
                    class="w-full pl-3 pr-10 py-2.5 border border-slate-800 rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none transition-all shadow-xl text-lg bg-white text-slate-950 placeholder-slate-400 font-medium"
                >
                <span id="clearSearch" title="Limpar pesquisa" class="text-slate-400 hover:text-slate-900">&times;</span>
            </div>

            <div id="uploadSection" class="hidden flex gap-2 flex-shrink-0">
                <button id="clearDataBtn" onclick="showConfirmDeleteModal()" class="bg-red-600 hover:bg-red-700 text-white px-3 py-2.5 rounded-xl transition-all border border-red-900 shadow-lg" title="Apagar Tudo">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
                <button onclick="openUploadModal()" class="bg-slate-800 hover:bg-black text-yellow-400 px-4 py-2.5 rounded-xl flex items-center gap-2 shadow-lg transition-all border border-slate-700 font-bold text-xs" title="Novo Excel">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    <span class="hidden sm:inline uppercase">Importar</span>
                </button>
            </div>
        </div>

        <div class="table-container">
            <table class="w-full text-left border-collapse">
                <tbody id="dataTableBody" class="divide-y divide-slate-300">
                </tbody>
            </table>
        </div>
    </main>

    <!-- Detalhes do Acesso -->
    <div id="detailsModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-[70] p-4">
        <div class="bg-slate-50 p-6 rounded-2xl shadow-2xl w-full max-w-sm relative border-2 border-slate-900">
            <h3 class="text-lg mb-4 text-slate-900 border-b-2 border-yellow-400 pb-1 uppercase tracking-tight font-bold">Detalhes do Acesso</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Documento / ID</label>
                    <p id="detId" class="text-lg font-mono text-slate-800 mt-1 font-bold"></p>
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Nome Completo</label>
                    <p id="detNome" class="text-xl text-slate-900 mt-0.5 font-bold"></p>
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Departamento / Vínculo</label>
                    <p id="detInfo" class="text-base text-slate-700 mt-0.5 italic"></p>
                </div>
            </div>
            <button onclick="closeModal('detailsModal')" class="w-full mt-8 bg-slate-900 hover:bg-black text-white py-3 rounded-xl shadow-md transition-transform active:scale-95 uppercase font-bold text-sm">Fechar</button>
        </div>
    </div>

    <!-- Modais Adicionais (Login, Upload, Confirm, Toast) omitidos aqui para brevidade do script, mas permanecem no código final -->
    <!-- ... Restante dos modais iguais ao original ... -->

    <div id="loginModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-50 p-4">
        <div class="bg-slate-100 p-6 rounded-2xl shadow-2xl w-full max-w-sm border-2 border-slate-900">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg text-slate-900 uppercase tracking-tighter font-bold">Acesso Restrito</h3>
                <button onclick="closeModal('loginModal')" class="text-slate-900 text-2xl hover:text-red-600 transition-colors">&times;</button>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" class="w-full p-3 border border-slate-400 rounded-lg outline-none text-sm" placeholder="Utilizador">
                <input type="password" id="password" class="w-full p-3 border border-slate-400 rounded-lg outline-none text-sm" placeholder="Palavra-passe">
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-yellow-400 p-3 rounded-lg shadow-lg hover:bg-black transition-all uppercase font-bold text-sm">Autenticar</button>
            </div>
        </div>
    </div>

    <div id="uploadModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-50 p-4">
        <div class="bg-slate-100 p-6 rounded-2xl shadow-2xl w-full max-w-sm border-2 border-slate-900">
            <h3 class="text-lg mb-2 text-center text-slate-900 uppercase font-bold">Importar Dados</h3>
            <p class="text-[10px] text-center text-red-600 uppercase font-bold mb-4">Atenção: Sobrescreve a base atual</p>
            <input type="file" id="excelInput" accept=".xlsx, .xls" class="mb-4 block w-full text-xs text-slate-700 bg-white p-2 rounded border border-slate-300">
            <button onclick="processExcel()" id="processBtn" class="w-full bg-slate-900 text-white p-3 rounded-lg disabled:bg-slate-400 shadow-md uppercase font-bold text-sm">Confirmar</button>
            <button onclick="closeModal('uploadModal')" class="w-full mt-2 text-xs text-slate-500">Cancelar</button>
        </div>
    </div>

    <div id="confirmDeleteModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-[60] p-4">
        <div class="bg-slate-50 p-8 rounded-2xl shadow-2xl w-full max-w-xs text-center border-2 border-red-900">
            <h3 class="text-lg mb-2 text-slate-950 uppercase font-bold">Apagar Tudo?</h3>
            <p class="text-xs text-slate-800 mb-6">Esta ação não pode ser desfeita.</p>
            <div class="flex flex-col gap-2">
                <button id="confirmClearBtn" onclick="clearDatabase()" class="w-full py-3 bg-red-700 text-white rounded-lg hover:bg-red-800 uppercase text-xs font-bold">Limpar Agora</button>
                <button onclick="closeModal('confirmDeleteModal')" class="w-full py-2 text-xs text-slate-500 font-medium">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-1/2 translate-x-1/2 sm:translate-x-0 sm:right-6 bg-slate-950 text-yellow-400 px-6 py-3 rounded-xl shadow-2xl transform translate-y-64 transition-transform duration-500 z-[100] border border-yellow-400/30 flex items-center gap-3">
        <div class="w-2 h-2 bg-yellow-400 rounded-full"></div>
        <span id="toastMsg" class="uppercase tracking-wider text-[11px] font-bold"></span>
    </div>

    <script>
        const supabaseUrl = 'https://rztrygjczjqeqqldiqxa.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6dHJ5Z2pjempxZXFxbGRpcXhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwNDgyMzIsImV4cCI6MjA3MzYyNDIzMn0.s7QiJWo6SPZRmN1bW1vPyhEis0xO1voNh0GFWPrTLtU';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);
        
        let allData = [];
        let currentUser = null;

        const loginBtn = document.getElementById('loginBtn');
        const uploadSection = document.getElementById('uploadSection');
        const dataTableBody = document.getElementById('dataTableBody');
        const resultCounter = document.getElementById('resultCounter');
        const lastUpdateSpan = document.getElementById('lastUpdateDate');
        const searchInput = document.getElementById('searchInput');
        const clearSearch = document.getElementById('clearSearch');
        const excelInput = document.getElementById('excelInput');
        const processBtn = document.getElementById('processBtn');

        window.addEventListener('DOMContentLoaded', () => {
            fetchData();
            fetchLastUpdate();
        });

        searchInput.addEventListener('input', () => {
            const term = searchInput.value;
            clearSearch.style.display = term ? 'block' : 'none';
            filterData(term);
        });

        clearSearch.addEventListener('click', () => {
            searchInput.value = '';
            clearSearch.style.display = 'none';
            filterData('');
            searchInput.focus();
        });

        loginBtn.addEventListener('click', () => {
            if (!currentUser) document.getElementById('loginModal').classList.remove('hidden');
            else handleLogout();
        });

        excelInput.addEventListener('change', () => processBtn.disabled = !excelInput.files[0]);

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openUploadModal() { document.getElementById('uploadModal').classList.remove('hidden'); }
        function showConfirmDeleteModal() { document.getElementById('confirmDeleteModal').classList.remove('hidden'); }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('translate-y-64');
            setTimeout(() => toast.classList.add('translate-y-64'), 3000);
        }

        async function fetchLastUpdate() {
            try {
                const { data } = await supabaseClient.from('sistema_config').select('valor').eq('chave', 'ultima_atualizacao').single();
                lastUpdateSpan.textContent = data ? data.valor.split(' ')[0] : '---';
            } catch (e) { lastUpdateSpan.textContent = 'Indisponível'; }
        }

        async function setLastUpdateDate() {
            const dateStr = new Date().toLocaleDateString('pt-BR');
            try { await supabaseClient.from('sistema_config').upsert({ chave: 'ultima_atualizacao', valor: dateStr }); lastUpdateSpan.textContent = dateStr; } catch (e) { console.error(e); }
        }

        async function handleLogin() {
            currentUser = { active: true };
            loginBtn.textContent = 'Sair Admin';
            loginBtn.classList.replace('bg-slate-900', 'bg-blue-800');
            uploadSection.classList.remove('hidden');
            closeModal('loginModal');
            showToast("Admin Ativo");
        }

        function handleLogout() {
            currentUser = null;
            loginBtn.textContent = 'Admin';
            loginBtn.classList.replace('bg-blue-800', 'bg-slate-900');
            uploadSection.classList.add('hidden');
            showToast("Logout efetuado");
        }

        async function fetchData() {
            try {
                const { data, error } = await supabaseClient.from('Estacionamento').select('*');
                if (error) throw error;
                allData = data || [];
                renderTable(allData);
            } catch (err) {
                dataTableBody.innerHTML = `<tr><td class="p-8 text-center text-red-900 uppercase font-bold text-xs">Erro ao carregar banco de dados.</td></tr>`;
            }
        }

        function normalizeString(str) {
            if (!str) return "";
            return str.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function filterData(term) {
            if (!term.trim()) { renderTable(allData); return; }
            const normalizedTerm = normalizeString(term);
            const parts = normalizedTerm.split(/\s+/).filter(p => p !== "");
            const filtered = allData.filter(item => {
                const searchStr = normalizeString(`${item.coluna_b} ${item.coluna_a}`);
                return parts.every(part => searchStr.includes(part));
            });
            renderTable(filtered);
        }

        function renderTable(data) {
            dataTableBody.innerHTML = '';
            resultCounter.textContent = data ? data.length : 0;
            if (!data || data.length === 0) {
                dataTableBody.innerHTML = '<tr><td class="p-12 text-center text-slate-800 uppercase tracking-widest bg-slate-200 font-bold text-[11px]">Nenhum registro encontrado</td></tr>';
                return;
            }
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-yellow-400 transition-all clickable-row group border-b border-slate-300";
                
                // Layout atualizado: Nome à esquerda, Departamento à direita
                tr.innerHTML = `
                    <td class="p-3.5 flex justify-between items-center gap-4">
                        <div class="flex flex-col min-w-0">
                            <span class="text-slate-950 text-base group-hover:pl-2 transition-all font-semibold uppercase truncate">
                                ${item.coluna_b || 'UTENTE'}
                            </span>
                        </div>
                        <div class="flex items-center gap-3 flex-shrink-0">
                            <span class="text-[10px] text-slate-600 font-bold uppercase italic tracking-tighter bg-slate-200/50 px-2 py-0.5 rounded group-hover:bg-slate-900 group-hover:text-yellow-400 transition-colors">
                                ${item.coluna_d || '---'}
                            </span>
                            <div class="hidden sm:flex bg-slate-900 text-white px-2 py-1 rounded text-[8px] uppercase font-bold opacity-0 group-hover:opacity-100 transition-opacity">
                                Ver
                            </div>
                        </div>
                    </td>
                `;
                tr.onclick = () => showDetails(item);
                dataTableBody.appendChild(tr);
            });
        }

        function showDetails(item) {
            document.getElementById('detId').textContent = item.coluna_a || '---';
            document.getElementById('detNome').textContent = (item.coluna_b || 'Sem Nome').toUpperCase();
            document.getElementById('detInfo').textContent = item.coluna_d || 'Setor não informado';
            document.getElementById('detailsModal').classList.remove('hidden');
        }

        async function clearDatabase(silent = false) {
            const confirmBtn = document.getElementById('confirmClearBtn');
            if (!silent) { confirmBtn.disabled = true; confirmBtn.textContent = "AGUARDE..."; }
            try {
                const { error } = await supabaseClient.from('Estacionamento').delete().neq('coluna_a', 'PROTECTED_ROW_ID');
                if (error) throw error;
                if (!silent) { showToast("Limpeza concluída"); closeModal('confirmDeleteModal'); fetchData(); }
                return true;
            } catch (err) { if (!silent) showToast("Erro na exclusão"); return false; } finally { if (!silent) { confirmBtn.disabled = false; confirmBtn.textContent = "LIMPAR AGORA"; } }
        }

        async function processExcel() {
            const file = excelInput.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, range: 2 });
                const formatted = rows.map(r => ({
                    coluna_a: r[0] ? String(r[0]).trim() : null,
                    coluna_b: `${r[1] || r[2] ? (r[1] || '') + ' ' + (r[2] || '') : 'Utente'}`.trim(),
                    coluna_c: "",
                    coluna_d: r[3] ? String(r[3]).trim() : "Geral"
                })).filter(i => i.coluna_a);
                
                if (formatted.length > 0) {
                    processBtn.textContent = "IMPORTANDO...";
                    processBtn.disabled = true;
                    if (await clearDatabase(true)) {
                        const { error } = await supabaseClient.from('Estacionamento').insert(formatted);
                        if (error) showToast("Erro: " + error.message);
                        else { await setLastUpdateDate(); showToast(`${formatted.length} IMPORTADOS`); closeModal('uploadModal'); fetchData(); }
                    }
                    processBtn.textContent = "CONFIRMAR";
                    processBtn.disabled = false;
                }
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
