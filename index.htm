<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estacionamento</title>
    <!-- Scripts Externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
        .table-container {
            height: 600px;
            overflow-y: auto;
            background: white;
            position: relative;
        }
        .table-container::-webkit-scrollbar {
            width: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- Header -->
    <header class="bg-white shadow-md p-4 flex justify-between items-center fixed top-0 w-full z-20 border-b border-gray-200">
        <h1 class="text-xl font-bold text-blue-600">Acesso ao Estacionamento</h1>
        <button id="loginBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition-all font-semibold">
            Admin
        </button>
    </header>

    <!-- Conteúdo Principal -->
    <main class="pt-24 px-6 max-w-6xl mx-auto pb-12">
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                <div class="flex items-center gap-2">
                    <span class="text-gray-600 font-medium">Registos na lista:</span>
                    <span id="resultCounter" class="bg-blue-600 text-white px-3 py-1 rounded-full text-sm font-bold">0</span>
                </div>

                <div id="uploadSection" class="hidden flex gap-3">
                    <button id="clearDataBtn" onclick="showConfirmDeleteModal()" class="bg-red-100 hover:bg-red-200 text-red-700 px-4 py-2 rounded-lg flex items-center gap-2 transition-all border border-red-200 font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        Apagar Tudo
                    </button>
                    <button onclick="openUploadModal()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 shadow-sm transition-all font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Importar Novo Excel
                    </button>
                </div>
            </div>

            <div class="table-container border border-gray-200 rounded-lg">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 z-10 bg-gray-50 shadow-sm">
                        <tr class="border-b border-gray-200">
                            <th class="p-4 font-bold text-gray-700 uppercase text-xs tracking-wider bg-gray-50">ID / Cartão</th>
                            <th class="p-4 font-bold text-gray-700 uppercase text-xs tracking-wider bg-gray-50">Nome do Utente</th>
                            <th class="p-4 font-bold text-gray-700 uppercase text-xs tracking-wider bg-gray-50">Departamento / Info</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="divide-y divide-gray-100">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modais -->
    <div id="loginModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md relative">
            <button onclick="closeModal('loginModal')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            <h3 class="text-2xl font-bold mb-6 text-center text-gray-800">Acesso Administrativo</h3>
            <div class="space-y-4">
                <input type="email" id="email" class="w-full p-3 border border-gray-300 rounded-lg" placeholder="Utilizador">
                <input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-lg" placeholder="Palavra-passe">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Entrar</button>
            </div>
        </div>
    </div>

    <div id="uploadModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md relative">
            <button onclick="closeModal('uploadModal')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            <h3 class="text-2xl font-bold mb-4 text-center">Importar Excel</h3>
            <input type="file" id="excelInput" accept=".xlsx, .xls" class="mb-4 block w-full">
            <button onclick="processExcel()" id="processBtn" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold disabled:bg-gray-300" disabled>Iniciar</button>
        </div>
    </div>

    <!-- MODAL DE CONFIRMAÇÃO DE EXCLUSÃO -->
    <div id="confirmDeleteModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-[60] p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-xl font-bold mb-2 text-gray-800">Tens a certeza?</h3>
            <p class="text-gray-600 mb-6">Esta ação irá apagar todos os dados permanentemente.</p>
            <div class="flex gap-3">
                <button onclick="closeModal('confirmDeleteModal')" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium">Cancelar</button>
                <button onclick="clearDatabase()" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium">Apagar Tudo</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-gray-900 text-white px-6 py-4 rounded-xl shadow-2xl transform translate-y-32 transition-transform duration-300 z-50">
        <span id="toastMsg"></span>
    </div>

    <script>
        const supabaseUrl = 'https://rztrygjczjqeqqldiqxa.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6dHJ5Z2pjempxZXFxbGRpcXhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwNDgyMzIsImV4cCI6MjA3MzYyNDIzMn0.s7QiJWo6SPZRmN1bW1vPyhEis0xO1voNh0GFWPrTLtU';
        
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);
        let currentUser = null;

        const loginBtn = document.getElementById('loginBtn');
        const uploadSection = document.getElementById('uploadSection');
        const dataTableBody = document.getElementById('dataTableBody');
        const resultCounter = document.getElementById('resultCounter');
        const clearDataBtn = document.getElementById('clearDataBtn');
        const excelInput = document.getElementById('excelInput');
        const processBtn = document.getElementById('processBtn');

        window.addEventListener('DOMContentLoaded', fetchData);

        loginBtn.addEventListener('click', () => {
            if (!currentUser) document.getElementById('loginModal').classList.remove('hidden');
            else handleLogout();
        });

        excelInput.addEventListener('change', () => processBtn.disabled = !excelInput.files[0]);

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openUploadModal() { document.getElementById('uploadModal').classList.remove('hidden'); }
        function showConfirmDeleteModal() { document.getElementById('confirmDeleteModal').classList.remove('hidden'); }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('translate-y-32');
            setTimeout(() => toast.classList.add('translate-y-32'), 4000);
        }

        async function handleLogin() {
            currentUser = { active: true };
            loginBtn.textContent = 'Sair';
            uploadSection.classList.remove('hidden');
            closeModal('loginModal');
            showToast("Modo Admin Ativo");
        }

        function handleLogout() {
            currentUser = null;
            loginBtn.textContent = 'Admin';
            uploadSection.classList.add('hidden');
        }

        // FUNÇÃO DE LIMPEZA REPROJETADA
        async function clearDatabase() {
            closeModal('confirmDeleteModal');
            clearDataBtn.disabled = true;
            clearDataBtn.textContent = "A obter IDs...";

            try {
                // Passo 1: Listar os IDs
                const { data: records, error: fetchError } = await supabaseClient
                    .from('Estacionamento')
                    .select('coluna_a');

                if (fetchError) throw fetchError;
                if (!records || records.length === 0) {
                    showToast("Tabela já está limpa.");
                    return;
                }

                const total = records.length;
                let falhas = 0;
                let sucessos = 0;

                // Passo 2: Apagar um por um
                for (let i = 0; i < total; i++) {
                    clearDataBtn.textContent = `Apagando ${i+1}/${total}...`;
                    
                    const { error: delError } = await supabaseClient
                        .from('Estacionamento')
                        .delete()
                        .eq('coluna_a', records[i].coluna_a);
                    
                    if (delError) {
                        console.error("Erro no ID", records[i].coluna_a, delError);
                        falhas++;
                    } else {
                        sucessos++;
                    }
                }

                if (sucessos > 0) {
                    showToast(`Sucesso: ${sucessos} registos apagados.`);
                }
                
                if (falhas > 0) {
                    showToast(`Atenção: ${falhas} registos falharam. Verifique o RLS no Supabase.`);
                }

                fetchData();
            } catch (err) {
                console.error("Erro fatal:", err);
                showToast("Erro ao processar limpeza.");
            } finally {
                clearDataBtn.disabled = false;
                clearDataBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg> Apagar Tudo`;
            }
        }

        async function fetchData() {
            try {
                const { data, error } = await supabaseClient.from('Estacionamento').select('*');
                if (error) throw error;
                renderTable(data);
            } catch (err) {
                dataTableBody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-red-500">Erro ao carregar dados.</td></tr>`;
            }
        }

        function renderTable(data) {
            dataTableBody.innerHTML = '';
            resultCounter.textContent = data ? data.length : 0;
            if (!data || data.length === 0) {
                dataTableBody.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-gray-400">Tabela vazia</td></tr>';
                return;
            }
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 border-b transition-colors";
                tr.innerHTML = `<td class="p-4 font-mono text-sm">${item.coluna_a || ''}</td><td class="p-4 font-bold text-gray-800">${item.coluna_b || ''}</td><td class="p-4 text-gray-600">${item.coluna_d || ''}</td>`;
                dataTableBody.appendChild(tr);
            });
        }

        async function processExcel() {
            const file = excelInput.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, range: 2 });
                
                const formatted = rows.map(r => ({
                    coluna_a: r[0] ? String(r[0]).trim() : null,
                    coluna_b: `${r[1] || r[2] ? (r[1] || '') + ' ' + (r[2] || '') : 'Utente s/ Nome'}`.trim(),
                    coluna_c: "",
                    coluna_d: r[3] ? String(r[3]).trim() : "Geral"
                })).filter(i => i.coluna_a && i.coluna_a !== "null" && i.coluna_a !== "undefined");

                if (formatted.length > 0) {
                    processBtn.textContent = "A importar...";
                    processBtn.disabled = true;
                    
                    const { error } = await supabaseClient.from('Estacionamento').insert(formatted);
                    
                    if (error) showToast("Erro ao importar: " + error.message);
                    else {
                        showToast("Dados importados com sucesso.");
                        closeModal('uploadModal');
                        fetchData();
                    }
                    processBtn.textContent = "Iniciar";
                    processBtn.disabled = false;
                }
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
