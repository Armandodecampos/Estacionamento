<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso: Estacionamento</title>
    <!-- Scripts Externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
        }
        .table-container {
            flex: 1;
            overflow-y: auto;
            background: #cbd5e1;
            position: relative;
        }
        .table-container::-webkit-scrollbar {
            width: 10px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #94a3b8;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 5px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #1e293b;
        }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-color: #475569;
        }
        .search-container {
            position: relative;
            flex: 1;
            width: 100%;
        }
        #clearSearch {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #1e293b;
            cursor: pointer;
            display: none;
            font-size: 1.25rem;
            line-height: 1;
        }
        .search-header-dark {
            background-color: #1e293b;
            padding: 16px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.1);
        }
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 1.5rem;
            background: #94a3b8;
            border-bottom: 2px solid #334155;
            z-index: 10;
        }
        tbody tr:nth-child(even) { background-color: #e2e8f0; }
        tbody tr:nth-child(odd) { background-color: #f1f5f9; }
        tbody tr:hover { background-color: #facc15 !important; }
        .user-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #1e293b;
            background-color: #94a3b8;
        }
        .user-photo-large {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1rem;
            border: 3px solid #facc15;
        }
        .photo-preview-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 1.5rem;
            position: relative;
        }
    </style>
</head>
<body class="font-sans text-sm">

    <!-- Header -->
    <header class="bg-slate-200 shadow-lg p-3 flex justify-between items-center gap-4 z-20 border-b-2 border-slate-400">
        <div class="flex items-center gap-3">
            <div class="bg-slate-900 p-1.5 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-yellow-400" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
                </svg>
            </div>
            <h1 class="text-lg text-slate-900 font-bold uppercase tracking-tight">Acesso: Estacionamento</h1>
        </div>
        <button id="loginBtn" class="bg-slate-900 hover:bg-black text-white px-4 py-1.5 rounded-lg transition-all text-xs font-bold border border-slate-700">
            ADMIN
        </button>
    </header>

    <!-- Barra de Estado -->
    <div class="status-bar text-[10px] sm:text-xs">
        <div class="flex items-center gap-2 text-slate-900 italic">
            <span class="not-italic font-bold">BASE ATUALIZADA EM:</span>
            <span id="lastUpdateDate" class="font-mono">---</span>
        </div>
        <div class="flex items-center gap-2 text-slate-900">
            <span class="uppercase font-bold">REGISTROS:</span>
            <span id="resultCounter" class="text-sm bg-slate-900 text-yellow-400 px-2 py-0.5 rounded shadow-md font-bold">0</span>
        </div>
    </div>

    <!-- Conteúdo Principal -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <div class="search-header-dark border-b border-slate-950 flex items-center px-4 gap-3">
            <div class="search-container">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Nome ou Documento..."
                    class="w-full pl-4 pr-10 py-3 border border-slate-800 rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none shadow-xl text-lg bg-white text-slate-950 font-medium"
                >
                <span id="clearSearch" class="text-slate-400 hover:text-slate-900 text-2xl">&times;</span>
            </div>

            <div id="uploadSection" class="hidden flex gap-2">
                <button onclick="showConfirmDeleteModal()" class="bg-red-600 hover:bg-red-700 text-white p-3 rounded-xl border border-red-900 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
                <button onclick="openUploadModal()" class="bg-slate-800 hover:bg-black text-yellow-400 px-4 py-3 rounded-xl flex items-center gap-2 border border-slate-700 font-bold text-xs">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                    <span class="hidden sm:inline">IMPORTAR EXCEL</span>
                </button>
            </div>
        </div>

        <div class="table-container">
            <table class="w-full text-left border-collapse">
                <tbody id="dataTableBody" class="divide-y divide-slate-300">
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modais -->
    <div id="detailsModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-[70] p-4">
        <div class="bg-slate-50 p-6 rounded-2xl shadow-2xl w-full max-w-sm relative border-2 border-slate-900">
            <h3 class="text-lg mb-4 text-slate-900 border-b-2 border-yellow-400 pb-1 uppercase font-bold">Dados do Acesso</h3>
            <div class="photo-preview-container">
                <img id="detPhoto" src="" class="user-photo-large shadow-lg cursor-zoom-in" alt="Foto">
                <div id="adminPhotoOverlay" class="hidden absolute inset-0 bg-black/40 rounded-2xl flex items-center justify-center gap-6 opacity-0 hover:opacity-100 transition-opacity">
                    <label class="cursor-pointer hover:scale-110 transition-transform" title="Alterar Foto">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        <input type="file" id="photoUpload" class="hidden" accept="image/*" onchange="handlePhotoUpload(this)">
                    </label>
                    <button onclick="removePhoto()" class="cursor-pointer hover:scale-110 transition-transform text-red-500" title="Remover Foto">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>
            </div>
            <div class="space-y-4">
                <div><label class="text-[10px] text-slate-500 uppercase font-bold">Documento / ID</label><p id="detId" class="text-lg font-mono text-slate-800 font-bold"></p></div>
                <div><label class="text-[10px] text-slate-500 uppercase font-bold">Nome Completo</label><p id="detNome" class="text-xl text-slate-900 font-bold"></p></div>
                <div><label class="text-[10px] text-slate-500 uppercase font-bold">Vínculo / Setor</label><p id="detInfo" class="text-base text-slate-700 italic"></p></div>
            </div>
            <button onclick="closeModal('detailsModal')" class="w-full mt-6 bg-slate-900 hover:bg-black text-white py-3 rounded-xl font-bold uppercase shadow-md">Voltar</button>
        </div>
    </div>

    <!-- Modal Login -->
    <div id="loginModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-50 p-4">
        <div class="bg-slate-100 p-6 rounded-2xl shadow-2xl w-full max-w-sm border-2 border-slate-900">
            <h3 class="text-lg text-slate-900 uppercase font-bold mb-6">Autenticação Administrativa</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold block mb-1">E-mail</label>
                    <input type="email" id="adminEmail" class="w-full p-4 border border-slate-400 rounded-lg outline-none focus:border-yellow-400" placeholder="exemplo@email.com">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold block mb-1">Senha</label>
                    <input type="password" id="adminPass" class="w-full p-4 border border-slate-400 rounded-lg outline-none focus:border-yellow-400" placeholder="Sua senha">
                </div>
                <button id="loginSubmitBtn" onclick="handleLogin()" class="w-full bg-slate-900 text-yellow-400 p-4 rounded-lg font-bold uppercase shadow-lg hover:bg-black transition-all">Entrar</button>
                <button onclick="closeModal('loginModal')" class="w-full text-slate-500 text-xs py-2">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modais de Feedback e Outros -->
    <div id="photoZoomModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-[100] p-4" onclick="closeModal('photoZoomModal')">
        <img id="zoomedImg" src="" class="max-w-full max-h-full rounded-2xl border-4 border-yellow-400" alt="Zoom">
    </div>

    <div id="uploadModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-50 p-4">
        <div class="bg-slate-100 p-6 rounded-2xl shadow-2xl w-full max-w-sm border-2 border-slate-900">
            <h3 class="text-lg mb-2 text-center text-slate-900 uppercase font-bold">Importar Excel</h3>
            <input type="file" id="excelInput" accept=".xlsx, .xls" class="mb-4 block w-full text-xs bg-white p-2 border border-slate-300">
            <button onclick="processExcel()" id="processBtn" class="w-full bg-slate-900 text-white p-3 rounded-lg font-bold uppercase shadow-md">Processar Arquivo</button>
            <button onclick="closeModal('uploadModal')" class="w-full mt-2 text-xs text-slate-500">Fechar</button>
        </div>
    </div>

    <div id="confirmDeleteModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-[60] p-4">
        <div class="bg-slate-50 p-8 rounded-2xl shadow-2xl w-full max-w-xs text-center border-2 border-red-900">
            <h3 class="text-lg mb-2 text-slate-950 uppercase font-bold">Limpar Banco?</h3>
            <p class="text-xs text-slate-800 mb-6">Todos os registros serão removidos.</p>
            <button id="confirmClearBtn" onclick="clearDatabase()" class="w-full py-3 bg-red-700 text-white rounded-lg font-bold uppercase text-xs mb-2">Sim, Apagar</button>
            <button onclick="closeModal('confirmDeleteModal')" class="w-full py-2 text-slate-500 text-xs font-medium">Cancelar</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-1/2 translate-x-1/2 bg-slate-950 text-yellow-400 px-6 py-3 rounded-xl shadow-2xl transform translate-y-64 transition-transform duration-500 z-[100] border border-yellow-400/30 font-bold uppercase text-[10px]">
        <span id="toastMsg"></span>
    </div>

    <script>
        // Configurações do Supabase
        const _SUPABASE_URL = 'https://rztrygjczjqeqqldiqxa.supabase.co';
        const _SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6dHJ5Z2pjempxZXFxbGRpcXhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwNDgyMzIsImV4cCI6MjA3MzYyNDIzMn0.s7QiJWo6SPZRmN1bW1vPyhEis0xO1voNh0GFWPrTLtU';

        let supabaseClient;
        let allData = [];
        let isAdmin = false;
        let selectedItem = null;

        const DEFAULT_PHOTO = 'data:image/svg+xml;charset=UTF-8,%3csvg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%2394a3b8"%3e%3cpath stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /%3e%3c/svg%3e';

        function initSupabase() {
            try {
                if (!supabaseClient) {
                    supabaseClient = window.supabase.createClient(_SUPABASE_URL, _SUPABASE_KEY);
                }
            } catch (e) {
                console.error("Erro ao inicializar Supabase:", e);
            }
        }

        window.onload = async () => {
            initSupabase();
            checkSession();
            fetchData();
            fetchLastUpdate();
        };

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                setAdminMode(true);
            }
        }

        async function fetchData() {
            if (!supabaseClient) return;
            const { data, error } = await supabaseClient.from('Estacionamento').select('*').order('coluna_b', { ascending: true });
            if (!error) {
                allData = data;
                renderTable(allData);
            }
        }

        async function fetchLastUpdate() {
            if (!supabaseClient) return;
            const { data } = await supabaseClient.from('sistema_config').select('valor').eq('chave', 'ultima_atualizacao').single();
            if (data) document.getElementById('lastUpdateDate').textContent = data.valor;
        }

        function normalizeString(str) {
            return str ? str.normalize('NFD').replace(/[\u0300-\u036f]/g, "").toLowerCase() : "";
        }

        function renderTable(data) {
            const container = document.getElementById('dataTableBody');
            const counter = document.getElementById('resultCounter');
            counter.textContent = data.length;
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<tr><td class="p-10 text-center text-slate-400 uppercase font-bold text-xs">Nenhum registro na base</td></tr>';
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "cursor-pointer transition-colors group";
                const photo = item.coluna_c || DEFAULT_PHOTO;

                tr.innerHTML = `
                    <td class="p-4 flex justify-between items-center gap-4 border-b border-slate-300">
                        <div class="flex items-center gap-4 min-w-0">
                            <img src="${photo}" class="user-thumb shadow-md group-hover:scale-110 transition-transform">
                            <div class="min-w-0">
                                <div class="text-slate-900 font-bold uppercase break-all text-sm">${item.coluna_b}</div>
                                <div class="text-[10px] text-slate-500 font-mono">${item.coluna_a}</div>
                            </div>
                        </div>
                        <div class="flex-shrink-0">
                            <span class="text-[9px] bg-slate-200 text-slate-700 px-2 py-1 rounded font-bold uppercase group-hover:bg-slate-900 group-hover:text-yellow-400 transition-colors">
                                ${item.coluna_d || 'GERAL'}
                            </span>
                        </div>
                    </td>
                `;
                tr.onclick = () => showDetails(item);
                container.appendChild(tr);
            });
        }

        function showDetails(item) {
            selectedItem = item;
            document.getElementById('detId').textContent = item.coluna_a;
            document.getElementById('detNome').textContent = item.coluna_b;
            document.getElementById('detInfo').textContent = item.coluna_d || 'Não Informado';
            const photo = item.coluna_c || DEFAULT_PHOTO;
            document.getElementById('detPhoto').src = photo;
            document.getElementById('detPhoto').onclick = () => zoomPhoto(photo);

            const overlay = document.getElementById('adminPhotoOverlay');
            isAdmin ? overlay.classList.remove('hidden') : overlay.classList.add('hidden');

            document.getElementById('detailsModal').classList.remove('hidden');
        }

        async function savePhoto(base64) {
            if (!selectedItem || !supabaseClient) return;
            showToast("PROCESSANDO...");
            const { error } = await supabaseClient.from('Estacionamento').update({ coluna_c: base64 }).eq('id', selectedItem.id);
            if (!error) {
                selectedItem.coluna_c = base64;
                document.getElementById('detPhoto').src = base64 || DEFAULT_PHOTO;
                fetchData();
                showToast(base64 ? "FOTO SALVA COM SUCESSO" : "FOTO REMOVIDA");
            } else {
                showToast("ERRO NA OPERAÇÃO");
            }
        }

        async function removePhoto() {
            if (confirm("Deseja realmente remover esta foto?")) {
                await savePhoto(null);
            }
        }

        async function handlePhotoUpload(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async (e) => await savePhoto(e.target.result);
            reader.readAsDataURL(input.files[0]);
        }

        window.addEventListener('paste', async (e) => {
            if (!isAdmin || document.getElementById('detailsModal').classList.contains('hidden')) return;

            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = async (event) => await savePhoto(event.target.result);
                    reader.readAsDataURL(blob);
                    break;
                }
            }
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('translate-y-64');
            setTimeout(() => toast.classList.add('translate-y-64'), 3000);
        }

        async function handleLogin() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('loginSubmitBtn');

            if (!email || !pass) {
                showToast("PREENCHA TODOS OS CAMPOS");
                return;
            }

            btn.disabled = true;
            btn.textContent = "A AUTENTICAR...";

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: pass
            });

            if (error) {
                showToast("ACESSO NEGADO: " + error.message.toUpperCase());
                btn.disabled = false;
                btn.textContent = "ENTRAR";
            } else {
                setAdminMode(true);
                closeModal('loginModal');
                showToast("BEM-VINDO, ADMIN");
            }
        }

        function setAdminMode(active) {
            isAdmin = active;
            if (active) {
                document.getElementById('uploadSection').classList.remove('hidden');
                document.getElementById('loginBtn').textContent = 'SAIR ADMIN';
                document.getElementById('loginBtn').classList.replace('bg-slate-900', 'bg-red-700');
            } else {
                document.getElementById('uploadSection').classList.add('hidden');
                document.getElementById('loginBtn').textContent = 'ADMIN';
                document.getElementById('loginBtn').classList.replace('bg-red-700', 'bg-slate-900');
            }
        }

        async function processExcel() {
            const file = document.getElementById('excelInput').files[0];
            if (!file || !supabaseClient) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, range: 2 });

                const formatted = rows.map(r => ({
                    coluna_a: r[0] ? String(r[0]).trim() : null,
                    coluna_b: `${r[1] || ''} ${r[2] || ''}`.trim() || 'Sem Nome',
                    coluna_d: r[3] ? String(r[3]).trim() : "GERAL",
                    coluna_c: null
                })).filter(i => i.coluna_a);

                if (formatted.length > 0) {
                    showToast("SINCRONIZANDO BASE...");

                    const currentIds = allData.map(item => item.coluna_a);
                    const newIds = formatted.map(item => item.coluna_a);

                    const idsToDelete = currentIds.filter(id => !newIds.includes(id));
                    const recordsToInsert = formatted.filter(item => !currentIds.includes(item.coluna_a));

                    let hasError = false;
                    if (idsToDelete.length > 0) {
                        const { error } = await supabaseClient.from('Estacionamento').delete().in('coluna_a', idsToDelete);
                        if (error) hasError = true;
                    }

                    if (!hasError && recordsToInsert.length > 0) {
                        const { error } = await supabaseClient.from('Estacionamento').insert(recordsToInsert);
                        if (error) hasError = true;
                    }

                    if (!hasError) {
                        const now = new Date().toLocaleDateString('pt-BR');
                        await supabaseClient.from('sistema_config').upsert({ chave: 'ultima_atualizacao', valor: now });
                        document.getElementById('lastUpdateDate').textContent = now;
                        showToast("SINCRONIZAÇÃO CONCLUÍDA");
                        closeModal('uploadModal');
                        fetchData();
                    } else {
                        showToast("ERRO NA SINCRONIZAÇÃO");
                    }
                }
            };
            reader.readAsArrayBuffer(file);
        }

        async function clearDatabase() {
            if (!supabaseClient) return;
            const { error } = await supabaseClient.from('Estacionamento').delete().neq('id', 0);
            if (!error) {
                showToast("BANCO DE DADOS LIMPO");
                closeModal('confirmDeleteModal');
                fetchData();
            }
        }

        function filterData(term) {
            if (!term) { renderTable(allData); return; }

            const tokens = term.split(/\s+/).filter(token => token.length > 0).map(token => normalizeString(token));

            const filtered = allData.filter(item => {
                const searchableString = normalizeString(`${item.coluna_a} ${item.coluna_b} ${item.coluna_d}`);
                return tokens.every(token => searchableString.includes(token));
            });

            renderTable(filtered);
        }

        document.getElementById('searchInput').oninput = (e) => {
            document.getElementById('clearSearch').style.display = e.target.value ? 'block' : 'none';
            filterData(e.target.value);
        };

        document.getElementById('clearSearch').onclick = () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearch').style.display = 'none';
            filterData('');
        };

        document.getElementById('loginBtn').onclick = async () => {
            if (isAdmin) {
                await supabaseClient.auth.signOut();
                location.reload();
            } else {
                document.getElementById('loginModal').classList.remove('hidden');
            }
        };

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openUploadModal() { document.getElementById('uploadModal').classList.remove('hidden'); }
        function showConfirmDeleteModal() { document.getElementById('confirmDeleteModal').classList.remove('hidden'); }
        function zoomPhoto(src) {
            if (src === DEFAULT_PHOTO) return;
            document.getElementById('zoomedImg').src = src;
            document.getElementById('photoZoomModal').classList.remove('hidden');
        }
    </script>
</body>
</html>
